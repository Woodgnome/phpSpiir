<div class="introTooltip transparent categoryChartTooltip" style="width: 320px;" data-offset-x="90">
    <div class="arrow bottom"></div>

    <div class="columns">
        <div class="leftColumn">
            <h3 data-bind="summarize: { text: categoryName, length: 13 }"></h3>

            <p class="labelledNumber bulletLabelledNumber" data-bind="visible: amount">
                <span class="title" data-bind="text: amountTitle"></span>
                <br />
                <span data-bind="attr: { 'class': 'chartBullet ' + bulletClass() }"></span>
                <span class="number currency" data-bind="formatNumber: amount, currency: currency"></span>
            </p>

            <div class="averages" data-bind="visible: average">
                <p class="title">Dit gennemsnit</p>
                <p class="average">
                    <span class="number currency" data-bind="formatNumber: average, currency: currency" title="Dit gennemsnit"></span>
                </p>
            </div>
        </div>
        <div class="rightColumn">
            <h3>Top poster</h3>

            <table data-bind="foreach: postings" class="postingList">
                <tr>
                    <td class="description" data-bind="summarize: { text: description, length: 15 }"></td>
                    <td class="amount" data-bind="formatNumber: $parent.amountMultiplier()*amount, currency: $parent.currency"></td>
                </tr>
            </table>
            <p class="actions">
                <a href="#" data-bind="attr: { href: postingUrl }">Se poster &raquo;</a>
            </p>
        </div>
    </div>
</div>
