<div class="modal wizardModal smallWizardModal">
    <h3>Bekræft email</h3>

    <p>
        Du skal bekræfte din email <b data-bind="text: email"></b> for at kunne bruge Spiir. 
    </p>

    <div class="actions">
        <p class="left">
            <a class="btn btn-secondary" data-bind="attr: { href: changeEmailUrl }">Skift email</a>
            <a class="btn btn-primary" data-bind="attr: { href: verifyEmailUrl }">Bekræft email</a>
        </p>
    </div>
</div>
